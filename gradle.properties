group=dev.folia
mcVersion=1.21.1
# This is the current API version for use in (paper-)plugin.yml files
# During snapshot cycles this should be the anticipated version of the release target
apiVersion=1.21.1-R0.1-SNAPSHOT
channel=STABLE

# NeoForge target version (21.1.x branch for Create/Sable compatibility)
neoforgeVersion=21.1.79

# paperRef — exact Paper commit for Folia dev/1.21.1
# From https://github.com/PaperMC/Folia/blob/dev/1.21.1/gradle.properties
# Commit: "Don't count mobs twice in per-player-mob-spawns" (2024-10-31)
paperRef=84281ceeefb9d294758a9a292ba6c01da40e8409

# Crelia-NeoForge: configuration-cache breaks paperweight 1.7.3 — disabled
org.gradle.configuration-cache=false
org.gradle.caching=true
org.gradle.parallel=true
org.gradle.vfs.watch=false

# Gradle 8.x JVM args for paperweight (needs more heap)
org.gradle.jvmargs=-Xmx2G
