name: Patch, Build, and Smoke Test

on:
  push:
    branches: [ "**" ]
  pull_request:

jobs:
  build:
    # Only run on PRs if the source branch is on someone else's repo
    if: ${{ github.event_name != 'pull_request' || github.repository != github.event.pull_request.head.repo.full_name }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Git Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Configure Git User Details
        run: git config --global user.email "actions@github.com" && git config --global user.name "Github Actions"

      - name: Apply Patches
        run: ./gradlew applyPatches --stacktrace

      - name: Build Crelia Standalone Jar
        run: ./gradlew :folia-server:creliaStandaloneJar --stacktrace

      - name: Locate Build Artifacts
        id: artifacts
        run: |
          JAR_PATH=$(find . -name "creliatest2.jar" -type f 2>/dev/null | head -1)
          if [ -z "$JAR_PATH" ]; then
            echo "ERROR: creliatest2.jar not found after build"
            find . -name "*.jar" -path "*/folia-server/*" -type f 2>/dev/null || true
            exit 1
          fi
          echo "jar_path=$JAR_PATH" >> "$GITHUB_OUTPUT"
          echo "Found artifact: $JAR_PATH"

      - name: Smoke Test
        id: smoke
        run: |
          chmod +x scripts/smoke-test.sh
          scripts/smoke-test.sh "${{ steps.artifacts.outputs.jar_path }}" 120
        continue-on-error: true

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        if: always() && steps.artifacts.outputs.jar_path != ''
        with:
          name: creliatest2
          path: ${{ steps.artifacts.outputs.jar_path }}
          retention-days: 14

      - name: Upload Smoke Test Log
        if: always() && steps.smoke.outcome != 'skipped'
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-log
          path: smoke-test.log
          retention-days: 7

      - name: Upload Crash Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crash-reports
          path: |
            **/crash-reports/
            **/logs/
          retention-days: 14

      - name: Check Smoke Test Result
        if: steps.smoke.outcome == 'failure'
        run: |
          echo "::error::Smoke test failed — see smoke-test-log artifact for details"
          exit 1